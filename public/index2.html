<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; font-family: 'Arial', sans-serif; min-height: 100vh; padding: 20px; }
        .hidden { display: none !important; }
        .battle-container { background: #2a2a3e; border: 3px solid #ff6b6b; border-radius: 10px; padding: 20px; max-width: 650px; width: 100%; margin: 0 auto; box-shadow: 0 0 20px rgba(255,107,107,0.5); }
        .battle-container.boss-fight { border-color: #ffd93d; box-shadow: 0 0 30px rgba(255,217,61,0.5); }
        .battle-container.elite-fight { border-color: #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .battle-container.global-fight { border-color: #ff4500; box-shadow: 0 0 40px rgba(255,69,0,0.7); }
        .back-btn { margin-bottom: 15px; padding: 10px 15px; background: #ff6b6b; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .menu-btn { padding: 15px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .battle-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #ff6b6b; padding-bottom: 15px; }
        .battle-title { font-size: 24px; font-weight: bold; }
        .level-info { font-size: 12px; color: #aaa; margin-top: 5px; }
        .battle-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .player-stats, .enemy-stats { background: #1a1a2e; padding: 15px; border-radius: 8px; border-left: 4px solid #4ecdc4; }
        .enemy-stats.boss-stats { border-left-color: #ffd93d; }
        .enemy-stats.elite-stats { border-left-color: #ffd700; }
        .enemy-stats.global-stats { border-left-color: #ff4500; }
        .player-name, .enemy-name { font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .stat-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; position: relative; }
        .health-bar, .mana-bar { flex: 1; height: 24px; background: #333; border-radius: 5px; overflow: hidden; border: 1px solid #555; position: relative; }
        .health-fill { height: 100%; background: linear-gradient(90deg, #ff6b6b 0%, #ff8e8e 100%); border-radius: 5px; transition: width 0.3s ease; }
        .health-fill.boss-health { background: linear-gradient(90deg, #ffd93d 0%, #ff8c00 100%); }
        .health-fill.elite-health { background: linear-gradient(90deg, #ffd700 0%, #ffaa00 100%); }
        .health-fill.global-health { background: linear-gradient(90deg, #ff4500 0%, #ff6347 100%); }
        .mana-fill { height: 100%; background: linear-gradient(90deg, #4ecdc4 0%, #6ee7de 100%); border-radius: 5px; transition: width 0.3s ease; }
        .stat-text { min-width: 80px; text-align: right; font-size: 12px; color: #aaa; }
        .hp-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; pointer-events: none; }
        .combat-log-section { background: #1a1a2e; border: 2px solid #ff6b6b; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .combat-log-title { font-weight: bold; margin-bottom: 10px; color: #ff6b6b; }
        .combat-log { height: 100px; overflow-y: auto; font-size: 12px; line-height: 1.6; color: #ccc; }
        .combat-log::-webkit-scrollbar { width: 6px; }
        .combat-log::-webkit-scrollbar-track { background: #333; border-radius: 3px; }
        .combat-log::-webkit-scrollbar-thumb { background: #ff6b6b; border-radius: 3px; }
        .turn-info { background: #1a1a2e; border-left: 4px solid #ffd93d; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 12px; color: #aaa; }
        .auto-config { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        .auto-config label { color: #aaa; font-size: 12px; }
        .auto-config select { padding: 6px 10px; border-radius: 6px; border: 2px solid #4ecdc4; background: #1a1a2e; color: #fff; font-size: 12px; }
        .abilities-section { margin-bottom: 20px; }
        .ability-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
        .ability-row:last-child { grid-template-columns: repeat(5, 1fr); }
        .ability-btn { padding: 12px 8px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; transition: all 0.3s ease; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .ability-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .ability-btn:active:not(:disabled) { transform: translateY(0); }
        .ability-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .strike { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .fireball { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .heal { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stun { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .poison { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); }
        .defend { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
        .rage { background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%); }
        .item { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .flee { background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%); }
        .defeat-overlay, .victory-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .defeat-box, .victory-box { background: #2a2a3e; border: 3px solid #ff6b6b; border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 0 40px rgba(255,107,107,0.7); }
        .victory-box { border-color: #ffd93d; box-shadow: 0 0 40px rgba(255,217,61,0.7); }
        .defeat-box h2 { color: #ff6b6b; font-size: 36px; margin-bottom: 20px; }
        .victory-box h2 { color: #ffd93d; font-size: 36px; margin-bottom: 20px; }
        .defeat-box p, .victory-box p { color: #aaa; font-size: 16px; margin-bottom: 25px; }
        .global-hp-info { text-align: center; color: #ffd93d; font-size: 13px; margin-bottom: 10px; }
        @media (max-width: 600px) {
            .battle-container { padding: 15px; }
            .battle-title { font-size: 18px; }
            .ability-btn { font-size: 11px; padding: 10px 6px; }
        }
    </style>
</head>
<body>
<div id="battle-screen" class="battle-container">
    <button class="back-btn" onclick="backToMenu()">← Back to Menu</button>
    <div class="battle-header">
        <div class="battle-title" id="battle-type">⚔️ Battle</div>
    </div>
    <div id="global-hp-display" class="global-hp-info hidden"></div>
    <div class="battle-stats">
        <div class="player-stats">
            <div class="player-name">❤️ <span id="player-display-name">Player</span></div>
            <div class="level-info">Level <span id="player-level">1</span> | EXP: <span id="player-exp">0</span>/<span id="player-exp-max">100</span></div>
            <div class="stat-bar"><div class="health-bar"><div class="health-fill" id="player-health-fill"></div><div class="hp-overlay" id="player-hp-overlay"></div></div><div class="stat-text" id="player-health-text">100/100</div></div>
            <div class="stat-bar"><div class="mana-bar"><div class="mana-fill" id="player-mana-fill"></div></div><div class="stat-text" id="player-mana-text">50/50</div></div>
        </div>
        <div class="enemy-stats" id="enemy-stats-panel">
            <div class="enemy-name">👹 <span id="enemy-display-name">Enemy</span></div>
            <div class="level-info">Level <span id="enemy-level">1</span> | 💰 Gold: <span id="enemy-gold">0</span></div>
            <div class="stat-bar"><div class="health-bar"><div class="health-fill" id="enemy-health-fill"></div><div class="hp-overlay" id="enemy-hp-overlay"></div></div><div class="stat-text" id="enemy-health-text">100/100</div></div>
        </div>
    </div>
    <div class="combat-log-section">
        <div class="combat-log-title">⚔️ Combat Log</div>
        <div class="combat-log" id="combat-log"></div>
    </div>
    <div class="turn-info" id="turn-info">Turn 1 • Use abilities wisely!</div>
    <div class="auto-config">
        <label>🤖 Auto Config:</label>
        <select id="auto-mode" onchange="updateAutoMode()">
            <option value="balanced">Balanced</option>
            <option value="melee">⚔️ Melee Only</option>
            <option value="magic">🔮 Magic Only</option>
        </select>
    </div>
    <div class="abilities-section">
        <div class="ability-row">
            <button class="ability-btn strike" id="strike-btn">⚔️ Strike</button>
            <button class="ability-btn fireball" id="fireball-btn">🔥 Fireball</button>
            <button class="ability-btn heal" id="heal-btn">💚 Heal</button>
            <button class="ability-btn stun" id="stun-btn">⚡ Stun</button>
        </div>
        <div class="ability-row">
            <button class="ability-btn poison" id="poison-btn">☠️ Poison</button>
            <button class="ability-btn defend" id="defend-btn">🛡️ Defend</button>
            <button class="ability-btn rage" id="rage-btn">😈 Rage</button>
            <button class="ability-btn item" id="item-btn">📦 Item</button>
            <button class="ability-btn flee" id="flee-btn">💨 Flee</button>
        </div>
        <button class="ability-btn" id="auto-btn" style="background:linear-gradient(135deg,#ffd93d 0%,#f59e0b 100%);color:#1a1a2e;width:100%;margin-top:8px;" onclick="toggleAuto()">🤖 Auto Battle: OFF</button>
    </div>
</div>

<div id="defeat-overlay" class="defeat-overlay hidden">
    <div class="defeat-box">
        <h2>💀 You Were Defeated!</h2>
        <p>But don't give up! A new challenger approaches...</p>
        <button class="menu-btn" id="retry-btn">⚔️ Fight Again!</button>
        <button class="back-btn" id="defeat-back-btn" style="margin-top:10px;">← Back to Menu</button>
    </div>
</div>

<div id="victory-overlay" class="victory-overlay hidden">
    <div class="victory-box">
        <h2>🏆 Victory!</h2>
        <p id="victory-message"></p>
        <button class="menu-btn" id="victory-continue-btn">Continue</button>
    </div>
</div>

<script src="gamestate.js"></script>
<script>
    var enemyDatabase = {

        25:[{name:'Dark Knight',icon:'⚔️',healthMult:1.0,damageMult:1.0,goldMin:40,goldMax:55},{name:'Demon',icon:'👿',healthMult:1.0,damageMult:1.2,goldMin:45,goldMax:60},{name:'Wraith',icon:'😈',healthMult:0.8,damageMult:1.3,goldMin:50,goldMax:65},{name:'Void Beast',icon:'⬛',healthMult:1.2,damageMult:1.1,goldMin:42,goldMax:58},{name:'Skeleton Warrior',icon:'💀',healthMult:0.9,damageMult:1.0,goldMin:38,goldMax:50},{name:'Crypt Stalker',icon:'👣',healthMult:0.7,damageMult:1.4,goldMin:48,goldMax:62}],
        45:[{name:'Wyvern',icon:'🐉',healthMult:1.2,damageMult:1.3,goldMin:60,goldMax:80},{name:'Lich Knight',icon:'💀',healthMult:1.1,damageMult:1.4,goldMin:65,goldMax:85},{name:'Nightmare Beast',icon:'😱',healthMult:1.4,damageMult:1.4,goldMin:70,goldMax:90},{name:'Infernal Guard',icon:'🔥',healthMult:1.3,damageMult:1.3,goldMin:55,goldMax:75},{name:'Shadow Lord',icon:'🖤',healthMult:1.3,damageMult:1.4,goldMin:75,goldMax:95},{name:'Fire Drake',icon:'🐲',healthMult:1.5,damageMult:1.2,goldMin:68,goldMax:88}],
        70:[{name:'Greater Demon',icon:'👿',healthMult:1.5,damageMult:1.7,goldMin:90,goldMax:120},{name:'Ancient Dragon',icon:'🐉',healthMult:1.7,damageMult:1.5,goldMin:100,goldMax:130},{name:'Reality Ripper',icon:'⚡',healthMult:1.4,damageMult:1.8,goldMin:95,goldMax:125},{name:'Arch Lich',icon:'💀',healthMult:1.3,damageMult:1.9,goldMin:110,goldMax:140},{name:'Void Lord',icon:'⬛',healthMult:1.6,damageMult:1.6,goldMin:105,goldMax:135},{name:'Rift Walker',icon:'🚶',healthMult:1.2,damageMult:2.0,goldMin:115,goldMax:145}],
        100:[{name:'Eldritch Abomination',icon:'👾',healthMult:2.0,damageMult:2.1,goldMin:150,goldMax:200},{name:'Void Emperor',icon:'⬛',healthMult:2.1,damageMult:2.1,goldMin:160,goldMax:210},{name:'Cosmic Horror',icon:'🌌',healthMult:2.0,damageMult:2.0,goldMin:145,goldMax:195},{name:'Apocalypse Herald',icon:'📯',healthMult:2.0,damageMult:2.2,goldMin:170,goldMax:220},{name:'Eldritch Watcher',icon:'👁️',healthMult:1.8,damageMult:2.3,goldMin:155,goldMax:205},{name:'Void Warden',icon:'🔒',healthMult:2.3,damageMult:1.9,goldMin:165,goldMax:215}],
        135:[{name:'Transcendent Being',icon:'✨',healthMult:2.5,damageMult:2.5,goldMin:220,goldMax:300},{name:'Beyond Existence',icon:'🌌',healthMult:2.7,damageMult:2.7,goldMin:250,goldMax:330},{name:'Celestial Tyrant',icon:'⭐',healthMult:2.6,damageMult:2.6,goldMin:230,goldMax:310},{name:'God of Ruin',icon:'⚡',healthMult:2.8,damageMult:2.6,goldMin:260,goldMax:340},{name:'Star Weaver',icon:'🌟',healthMult:2.4,damageMult:2.8,goldMin:240,goldMax:320},{name:'Lightbane',icon:'☀️',healthMult:2.9,damageMult:2.4,goldMin:270,goldMax:350}],
        175:[{name:'Abyssal Horror',icon:'🦑',healthMult:3.2,damageMult:3.2,goldMin:350,goldMax:480},{name:'Deep One',icon:'🐙',healthMult:3.0,damageMult:3.4,goldMin:330,goldMax:460},{name:'Leviathan Spawn',icon:'🐋',healthMult:3.5,damageMult:3.0,goldMin:370,goldMax:500},{name:'Trench Walker',icon:'🚶',healthMult:3.1,damageMult:3.3,goldMin:340,goldMax:470},{name:'Abyssal Mage',icon:'🧙',healthMult:2.8,damageMult:3.6,goldMin:360,goldMax:490},{name:'Void Kraken',icon:'🐙',healthMult:3.4,damageMult:3.1,goldMin:380,goldMax:510}],
        210:[{name:'Phoenix Knight',icon:'🔥',healthMult:3.8,damageMult:3.8,goldMin:500,goldMax:700},{name:'Eternal Flame',icon:'💥',healthMult:3.6,damageMult:4.0,goldMin:480,goldMax:680},{name:'Ash Warden',icon:'🛡️',healthMult:4.0,damageMult:3.6,goldMin:520,goldMax:720},{name:'Inferno Lord',icon:'👑',healthMult:3.9,damageMult:3.9,goldMin:510,goldMax:710},{name:'Cinder Beast',icon:'🐗',healthMult:4.2,damageMult:3.5,goldMin:490,goldMax:690},{name:'Blaze Spirit',icon:'👻',healthMult:3.5,damageMult:4.2,goldMin:530,goldMax:730}],
        250:[{name:'The Eternal One',icon:'👑',healthMult:4.5,damageMult:4.5,goldMin:800,goldMax:1100},{name:'The Infinite Terror',icon:'👻',healthMult:4.7,damageMult:4.7,goldMin:850,goldMax:1150},{name:'Absolute Sovereign',icon:'⭐',healthMult:4.5,damageMult:4.8,goldMin:820,goldMax:1120},{name:'Chaos Unbound',icon:'🌀',healthMult:4.8,damageMult:4.5,goldMin:880,goldMax:1180},{name:'Void Incarnate',icon:'⬛',healthMult:5.0,damageMult:4.4,goldMin:900,goldMax:1200},{name:'Infinity Golem',icon:'♾️',healthMult:5.2,damageMult:4.3,goldMin:920,goldMax:1250}]
    };

    var currentBattle = null;
    var autoBattle = false;
    var autoTimer = null;
    var autoMode = 'balanced';
    var globalBossHP = parseInt(localStorage.getItem('globalBossHP')) || 1000000;
    var globalBossMaxHP = 1000000;
    var isGlobalBoss = false;

    fetch('/api/globalboss').then(function(r){return r.json();}).then(function(data){
        globalBossHP = data.hp;
        globalBossMaxHP = data.maxHp;
        localStorage.setItem('globalBossHP', globalBossHP);
    });

    function updateAutoMode(){ autoMode = document.getElementById('auto-mode').value; }

    function BattleSystem(config) {
        var self = this;
        this.isBossFight = config.isBossFight || false;
        this.isGlobalBoss = config.isGlobalBoss || false;
        this.isElite = false;
        this.bossIndex = config.bossIndex;
        this.worldLevel = config.worldLevel;
        this.enemiesDefeated = 0;
        this.totalGoldEarned = 0;
        this.poisonTurns = 0;
        this.poisonDamage = 0;
        isGlobalBoss = this.isGlobalBoss;

        if (this.isGlobalBoss) {
            document.getElementById('battle-screen').classList.add('global-fight');
            document.getElementById('enemy-stats-panel').classList.add('global-stats');
            document.getElementById('battle-type').innerHTML = '👑 GLOBAL BOSS: World Eater';
            document.getElementById('global-hp-display').classList.remove('hidden');
        } else if (this.isBossFight) {
            this.bossData = gameState.bosses[this.bossIndex];
            this.worldLevel = this.bossData.worldLevel;
            document.getElementById('battle-screen').classList.add('boss-fight');
            document.getElementById('enemy-stats-panel').classList.add('boss-stats');
            document.getElementById('battle-type').innerHTML = '👑 BOSS: ' + this.bossData.name;
        } else {
            var w = null;
            for (var i = 0; i < gameState.worlds.length; i++) { if (gameState.worlds[i].level === this.worldLevel) { w = gameState.worlds[i]; break; } }
            document.getElementById('battle-type').innerHTML = '⚔️ ' + (w ? w.name : 'World ' + this.worldLevel);
        }

        this.player = { name: gameState.player.name, level: gameState.player.level, maxHealth: gameState.player.maxHealth, health: gameState.player.maxHealth, maxMana: gameState.player.maxMana, mana: gameState.player.maxMana, defending: false, rage: 0 };
        this.turn = 1;
        this.combatLog = [];
        this.gameActive = true;

        this.syncPlayerStats = function() {
            gameState.recalculateStats();
            self.player.maxHealth = gameState.player.maxHealth;
            self.player.maxMana = gameState.player.maxMana;
            self.player.level = gameState.player.level;
            self.player.health = gameState.player.maxHealth;
            self.player.mana = gameState.player.maxMana;
            self.player.name = gameState.player.name;
        };

        this.initListeners = function() {
            document.getElementById('strike-btn').onclick = function() { self.useAbility('strike'); };
            document.getElementById('fireball-btn').onclick = function() { self.useAbility('fireball'); };
            document.getElementById('heal-btn').onclick = function() { self.useAbility('heal'); };
            document.getElementById('stun-btn').onclick = function() { self.useAbility('stun'); };
            document.getElementById('poison-btn').onclick = function() { self.useAbility('poison'); };
            document.getElementById('defend-btn').onclick = function() { self.useAbility('defend'); };
            document.getElementById('rage-btn').onclick = function() { self.useAbility('rage'); };
            document.getElementById('item-btn').onclick = function() { self.useAbility('item'); };
            document.getElementById('flee-btn').onclick = function() { self.useAbility('flee'); };
        };

        this.spawnEnemy = function() {
            if (self.isGlobalBoss) {
                self.enemy = { name: 'World Eater', icon: '🌍', level: 999, maxHealth: globalBossHP, health: globalBossHP, baseDamage: 200, goldMin: 5000, goldMax: 10000, isBoss: true, isGlobal: true, expReward: 5000 };
                document.getElementById('enemy-health-fill').classList.add('global-health');
            } else if (self.isBossFight) {
                var b = self.bossData;
                self.enemy = { name: b.name, icon: b.icon, level: b.worldLevel, maxHealth: Math.floor((80+b.worldLevel*15)*b.healthMult), health: Math.floor((80+b.worldLevel*15)*b.healthMult), baseDamage: Math.floor((15+b.worldLevel*3)*b.damageMult), goldMin: b.goldMin, goldMax: b.goldMax, isBoss: true, amulet: b.amulet, expReward: b.expReward };
                document.getElementById('enemy-health-fill').classList.add('boss-health');
            } else {
                var enemies = enemyDatabase[self.worldLevel];
                var tpl = enemies[Math.floor(Math.random() * enemies.length)];
                self.isElite = Math.random() < 0.15;
                var em = self.isElite ? 1.5 : 1;
                var egm = self.isElite ? 2 : 1;
                self.enemy = { name: (self.isElite?'⭐ ':'')+tpl.name, icon: tpl.icon, level: self.worldLevel, maxHealth: Math.floor((40+self.worldLevel*8)*tpl.healthMult*em), health: Math.floor((40+self.worldLevel*8)*tpl.healthMult*em), baseDamage: Math.floor((8+self.worldLevel*1.5)*tpl.damageMult*em), goldMin: Math.floor(tpl.goldMin*egm), goldMax: Math.floor(tpl.goldMax*egm), isBoss: false, isElite: self.isElite };
                if (self.isElite) {
                    document.getElementById('battle-screen').classList.add('elite-fight');
                    document.getElementById('enemy-stats-panel').classList.add('elite-stats');
                    document.getElementById('enemy-health-fill').classList.add('elite-health');
                }
            }
            self.poisonTurns = 0;
            self.poisonDamage = 0;
        };

        this.useAbility = function(key) {
            if (!self.gameActive) return;
            var costs = { strike:0, fireball:20, heal:25, stun:15, poison:15, defend:0, rage:30, item:0, flee:0 };
            if (costs[key] > self.player.mana) { self.addLog('⚠️ Not enough mana!'); return; }
            self.player.mana = Math.max(0, self.player.mana - costs[key]);
            var t = gameState.getTotalStats();
            var msg = '';
            var isCrit = Math.random() < 0.10;

            if (key === 'strike') {
                var d = self.rand([15,25]) + Math.floor(t.damage * 0.5);
                if (self.player.rage > 0) { d = Math.floor(d * 1.5); self.player.rage = 0; }
                if (isCrit) d = Math.floor(d * 2);
                self.enemy.health = Math.max(0, self.enemy.health - d);
                if (self.isGlobalBoss) { globalBossHP = Math.max(0, globalBossHP - d); fetch('/api/globalboss/damage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({damage:d})}); }
                msg = '⚔️ Strike: ' + d + ' dmg' + (isCrit ? ' 💥CRIT!' : '');
            } else if (key === 'fireball') {
                var d = self.rand([30,50]) + Math.floor(t.intelligence * 0.6);
                if (self.player.rage > 0) { d = Math.floor(d * 1.5); self.player.rage = 0; }
                if (isCrit) d = Math.floor(d * 2);
                self.enemy.health = Math.max(0, self.enemy.health - d);
                if (self.isGlobalBoss) { globalBossHP = Math.max(0, globalBossHP - d); fetch('/api/globalboss/damage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({damage:d})}); }
                msg = '🔥 Fireball: ' + d + ' dmg' + (isCrit ? ' 💥CRIT!' : '');
            } else if (key === 'heal') {
                var h = self.rand([30,50]);
                if (t.healBoost > 0) h = Math.floor(h * (1 + t.healBoost / 100));
                self.player.health = Math.min(self.player.maxHealth, self.player.health + h);
                msg = '💚 Heal: +' + h + ' HP';
            } else if (key === 'stun') {
                self.enemy.stunned = true;
                msg = '⚡ ' + self.enemy.name + ' stunned!';
            } else if (key === 'poison') {
                self.poisonTurns = 3;
                self.poisonDamage = Math.floor(self.player.maxHealth * 0.03) + Math.floor(t.intelligence * 0.3);
                msg = '☠️ Poisoned for 3 turns! (' + self.poisonDamage + ' dmg/turn)';
            } else if (key === 'defend') {
                self.player.defending = true;
                msg = '🛡️ Defending!';
            } else if (key === 'rage') {
                self.player.rage = 1.5;
                msg = '😈 Rage! Next attack +50% dmg';
            } else if (key === 'item') {
                var h = self.rand([40,80]);
                if (t.healBoost > 0) h = Math.floor(h * (1 + t.healBoost / 100));
                self.player.health = Math.min(self.player.maxHealth, self.player.health + h);
                msg = '📦 Item: +' + h + ' HP';
            } else if (key === 'flee') {
                if (self.isBossFight || self.isGlobalBoss) { msg = '🚫 Cannot flee!'; }
                else if (Math.random() < 0.4) { self.gameActive = false; self.endBattle(false); return; }
                else msg = '💨 Failed to flee!';
            }

            self.addLog(msg);
            self.updateUI();
            if (!self.gameActive) return;
            setTimeout(function() { self.enemyTurn(); }, 500);
        };

        this.enemyTurn = function() {
            if (!self.gameActive) return;
            if (self.poisonTurns > 0) {
                self.enemy.health = Math.max(0, self.enemy.health - self.poisonDamage);
                if (self.isGlobalBoss) { globalBossHP = Math.max(0, globalBossHP - self.poisonDamage); fetch('/api/globalboss/damage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({damage:self.poisonDamage})}); }
                self.addLog('☠️ Poison deals ' + self.poisonDamage + ' damage! (' + (self.poisonTurns - 1) + ' turns left)');
                self.poisonTurns--;
                if (self.enemy.health <= 0) { self.enemy.health = 0; self.updateUI(); self.checkBattleEnd(); return; }
            }
            if (self.enemy.stunned) {
                self.addLog('⚡ ' + self.enemy.name + ' is stunned!');
                self.enemy.stunned = false;
            } else {
                var dmg = self.rand([self.enemy.baseDamage * 0.7, self.enemy.baseDamage * 1.3]);
                if (self.player.defending) {
                    var actual = Math.floor(dmg * 0.4);
                    self.player.defending = false;
                    self.addLog(self.enemy.icon + ' ' + self.enemy.name + ' attacks! Defended: ' + actual + ' dmg');
                } else {
                    self.player.health = Math.max(0, self.player.health - dmg);
                    self.addLog(self.enemy.icon + ' ' + self.enemy.name + ' attacks for ' + dmg + ' dmg!');
                }
            }
            self.player.mana = Math.min(self.player.maxMana, self.player.mana + 15);
            self.turn++;
            self.updateUI();
            self.checkBattleEnd();
        };

        this.checkBattleEnd = function() {
            if (self.player.health <= 0) {
                self.addLog('💀 You were defeated!');
                self.gameActive = false;
                self.updateUI();
                if (autoBattle) { self.addLog('🔄 Auto-reviving...'); setTimeout(function() { self.restart(); }, 800); return; }
                setTimeout(function() { self.showDefeat(); }, 600);
            } else if (self.enemy.health <= 0) {
                self.enemiesDefeated++;
                if (self.isGlobalBoss) { self.addLog('🏆 GLOBAL BOSS DEFEATED!'); self.globalReward(); }
                else if (self.isBossFight) { self.addLog('🏆 ' + self.enemy.name + ' HAS BEEN DEFEATED!'); self.bossReward(); }
                else { self.addLog('✨ ' + self.enemy.name + ' defeated! (' + self.enemiesDefeated + ' total)'); self.reward(); self.spawnNext(); }
            }
        };

        this.globalReward = function() {
            var gr = self.rand([5000,10000]);
            gameState.gainGold(gr); gameState.gainExp(5000); gameState.addKill();
            self.totalGoldEarned += gr;
            globalBossHP = globalBossMaxHP;
            fetch('/api/globalboss/reset',{method:'POST'});
            gameState.saveToLocalStorage();
            self.showVictory('🌍 Global Boss defeated!\n💰 +' + gr + ' Gold | +5000 EXP\nGlobal boss respawned!');
        };

        this.reward = function() {
            var gr = self.rand([self.enemy.goldMin, self.enemy.goldMax]);
            var bg = gameState.gainGold(gr);
            var w = null;
            for (var i = 0; i < gameState.worlds.length; i++) { if (gameState.worlds[i].level === self.worldLevel) { w = gameState.worlds[i]; break; } }
            var oldLevel = gameState.player.level;
            gameState.gainExp(w ? w.baseExp : 50);
            gameState.addKill();
            self.totalGoldEarned += gr + bg;
            self.addLog('💰 ' + gr + ' Gold!' + (bg > 0 ? ' (+' + bg + ')' : ''));
            if (gameState.player.level > oldLevel) { self.addLog('🎉 LEVEL UP! Now level ' + gameState.player.level + '!'); self.syncPlayerStats(); }
            var dropTable = gameState.dropTables[self.worldLevel];
            if (dropTable) {
                var roll = Math.random(), cum = 0;
                for (var j = 0; j < dropTable.length; j++) { cum += dropTable[j].dropRate; if (roll < cum) { gameState.addDropToInventory(dropTable[j]); gameState.addMaterial(dropTable[j]); self.addLog('💎 ' + dropTable[j].name + '!'); break; } }
            }
        };

        this.bossReward = function() {
            var gr = self.rand([self.enemy.goldMin, self.enemy.goldMax]);
            var bg = gameState.gainGold(gr);
            var oldLevel = gameState.player.level;
            gameState.gainExp(self.enemy.expReward);
            gameState.addKill();
            self.totalGoldEarned += gr + bg;
            self.addLog('💰 ' + gr + ' Gold!' + (bg>0?' (+'+bg+')':'') + ' +' + self.enemy.expReward + ' EXP');
            if (gameState.player.level > oldLevel) { self.addLog('🎉 LEVEL UP!'); self.syncPlayerStats(); }

            if (!gameState.player.bossDefeats[self.bossData.worldLevel]) {
                gameState.player.bossDefeats[self.bossData.worldLevel] = true;
                gameState.addToInventory({ id: self.enemy.amulet.id, name: self.enemy.amulet.name, icon: self.enemy.amulet.icon, description: self.enemy.amulet.description, stats: JSON.parse(JSON.stringify(self.enemy.amulet.stats)), type: 'amulet', price: 0, quantity: 1, unique: true });
                if (self.bossData.petDrop && gameState.player.pets.indexOf(self.bossData.petDrop) === -1) { gameState.player.pets.push(self.bossData.petDrop); gameState.addPetToInventory(self.bossData.petDrop); }
                gameState.saveToLocalStorage();
                self.showVictory('🎉 First defeat! Earned ' + self.enemy.amulet.name + '!\n💰 +' + (gr+bg) + ' Gold | +' + self.enemy.expReward + ' EXP');
            } else {
                if (self.bossData.petDrop && gameState.player.pets.indexOf(self.bossData.petDrop) === -1 && Math.random() < 0.15) { gameState.player.pets.push(self.bossData.petDrop); gameState.addPetToInventory(self.bossData.petDrop); }
                self.showVictory('💰 +' + (gr+bg) + ' Gold | +' + self.enemy.expReward + ' EXP');
            }
        };

        this.showVictory = function(msg) {
            self.gameActive = false; self.updateUI();
            if (autoBattle) { autoBattle = false; if (autoTimer) clearTimeout(autoTimer); var btn = document.getElementById('auto-btn'); if (btn) { btn.textContent = '🤖 Auto Battle: OFF'; btn.style.background = 'linear-gradient(135deg,#ffd93d 0%,#f59e0b 100%)'; } }
            document.getElementById('victory-message').textContent = msg;
            document.getElementById('victory-overlay').classList.remove('hidden');
            document.getElementById('victory-continue-btn').onclick = function() { window.location.href = 'index.html'; };
        };

        this.showDefeat = function() {
            document.getElementById('defeat-overlay').classList.remove('hidden');
            document.getElementById('retry-btn').onclick = function() { document.getElementById('defeat-overlay').classList.add('hidden'); self.restart(); };
            document.getElementById('defeat-back-btn').onclick = function() { window.location.href = 'index.html'; };
        };

        this.restart = function() {
            self.syncPlayerStats(); self.player.defending = false; self.player.rage = 0; self.turn = 1; self.combatLog = []; self.gameActive = true; self.poisonTurns = 0; self.poisonDamage = 0;
            self.spawnEnemy(); self.updateUI(); self.updateCombatLog(); self.addLog('🔄 You stand up ready to fight again!');
            if (autoBattle) runAuto();
        };

        this.spawnNext = function() { self.addLog('🎪 A new enemy appears!'); self.spawnEnemy(); self.turn = 1; self.updateUI(); };
        this.endBattle = function(fled) { if (fled === undefined) fled = true; if (fled) self.addLog('💨 Successfully escaped!'); setTimeout(function() { window.location.href = 'index.html'; }, 1500); };
        this.rand = function(range) { return Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0]; };
        this.addLog = function(msg) { self.combatLog.push('[Turn ' + self.turn + '] ' + msg); if (self.combatLog.length > 15) self.combatLog.shift(); self.updateCombatLog(); };
        this.updateCombatLog = function() { var el = document.getElementById('combat-log'); el.innerHTML = ''; for (var i = 0; i < self.combatLog.length; i++) { el.innerHTML += '<div>' + self.combatLog[i] + '</div>'; } el.scrollTop = el.scrollHeight; };

        this.updateUI = function() {
            document.getElementById('player-display-name').textContent = self.player.name;
            document.getElementById('player-level').textContent = self.player.level;
            document.getElementById('player-exp').textContent = gameState.player.exp;
            document.getElementById('player-exp-max').textContent = gameState.player.expToNextLevel;
            document.getElementById('enemy-display-name').textContent = self.enemy.icon + ' ' + self.enemy.name;
            document.getElementById('enemy-level').textContent = self.enemy.level;
            document.getElementById('enemy-gold').textContent = self.enemy.goldMin + '-' + self.enemy.goldMax;
            document.getElementById('player-health-fill').style.width = (self.player.health / self.player.maxHealth * 100) + '%';
            document.getElementById('player-health-text').textContent = Math.floor(self.player.health) + '/' + self.player.maxHealth;
            document.getElementById('player-hp-overlay').textContent = Math.floor(self.player.health) + ' / ' + self.player.maxHealth;
            document.getElementById('enemy-health-fill').style.width = (self.enemy.health / self.enemy.maxHealth * 100) + '%';
            document.getElementById('enemy-health-text').textContent = Math.floor(self.enemy.health) + '/' + self.enemy.maxHealth;
            document.getElementById('enemy-hp-overlay').textContent = Math.floor(self.enemy.health) + ' / ' + self.enemy.maxHealth;
            document.getElementById('player-mana-fill').style.width = (self.player.mana / self.player.maxMana * 100) + '%';
            document.getElementById('player-mana-text').textContent = Math.floor(self.player.mana) + '/' + self.player.maxMana;
            document.getElementById('turn-info').textContent = 'Turn ' + self.turn + ' • Kills: ' + self.enemiesDefeated + ' • Gold: ' + self.totalGoldEarned + (self.poisonTurns > 0 ? ' ☠️ Poison: ' + self.poisonTurns + 't' : '');
            if (self.isGlobalBoss) {
                document.getElementById('global-hp-display').textContent = '🌍 Global HP: ' + globalBossHP.toLocaleString() + ' / ' + globalBossMaxHP.toLocaleString();
                self.enemy.health = globalBossHP;
                self.enemy.maxHealth = globalBossMaxHP;
            }
            var buttons = document.querySelectorAll('.ability-btn');
            for (var i = 0; i < buttons.length; i++) { buttons[i].disabled = !self.gameActive; }
        };

        this.initListeners();
        this.spawnEnemy();
        this.updateUI();
    }

    function toggleAuto() {
        autoBattle = !autoBattle;
        var btn = document.getElementById('auto-btn');
        if (autoBattle) {
            var modeLabel = autoMode === 'melee' ? '⚔️ Melee' : autoMode === 'magic' ? '🔮 Magic' : 'Balanced';
            btn.textContent = '🤖 Auto Battle: ON (' + modeLabel + ')';
            btn.style.background = 'linear-gradient(135deg,#43e97b 0%,#22c55e 100%)';
            runAuto();
        } else {
            btn.textContent = '🤖 Auto Battle: OFF';
            btn.style.background = 'linear-gradient(135deg,#ffd93d 0%,#f59e0b 100%)';
            if (autoTimer) clearTimeout(autoTimer);
        }
    }

    function runAuto() {
        if (!autoBattle || !currentBattle || !currentBattle.gameActive) return;
        if (autoMode === 'melee') { currentBattle.useAbility('strike'); }
        else if (autoMode === 'magic') { if (currentBattle.player.mana >= 20) currentBattle.useAbility('fireball'); else currentBattle.useAbility('strike'); }
        else {
            var t = gameState.getTotalStats();
            var sd = Math.floor(t.damage * 0.8 + currentBattle.rand([5,15]));
            var fd = Math.floor(t.intelligence * 1.0 + currentBattle.rand([10,25]));
            if (currentBattle.player.mana >= 20 && fd > sd) currentBattle.useAbility('fireball'); else currentBattle.useAbility('strike');
        }
        autoTimer = setTimeout(runAuto, 1200);
    }

    function backToMenu() { window.location.href = 'index.html'; }

    var params = new URLSearchParams(window.location.search);
    var wp = params.get('world');
    var bp = params.get('boss');
    if (bp === 'global') { currentBattle = new BattleSystem({ isGlobalBoss: true }); }
    else if (bp !== null) { currentBattle = new BattleSystem({ isBossFight: true, bossIndex: parseInt(bp) }); }
    else if (wp !== null) { currentBattle = new BattleSystem({ isBossFight: false, worldLevel: gameState.worlds[parseInt(wp)].level }); }
</script>
</body>
</html>
