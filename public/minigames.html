<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minigames</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; font-family: 'Arial', sans-serif; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 42px; color: #ff6b6b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .header p { color: #aaa; margin-top: 10px; }
        .back-btn { padding: 10px 20px; background: #ff6b6b; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .back-btn:hover { transform: translateY(-2px); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #2a2a3e; border-radius: 10px; padding: 12px 20px; margin-bottom: 20px; border: 2px solid #ff6b6b; flex-wrap: wrap; gap: 10px; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s ease; color: #fff; }
        .tab-btn.active { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .tab-fish { background: #4ecdc4; } .tab-fish.active { background: #3dbdb5; }
        .tab-mine { background: #f39c12; } .tab-mine.active { background: #e67e22; }
        .minigame-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .minigame-card { background: #2a2a3e; border: 3px solid #4ecdc4; border-radius: 15px; padding: 25px; text-align: center; }
        .minigame-card.mining-card { border-color: #f39c12; }
        .minigame-card h2 { font-size: 24px; margin-bottom: 10px; color: #ffd93d; }
        .minigame-card .icon { font-size: 48px; margin-bottom: 10px; }
        .minigame-card .stats { font-size: 13px; color: #aaa; margin-bottom: 15px; }
        .action-btn { padding: 14px 35px; background: linear-gradient(135deg, #4ecdc4 0%, #2ecc71 100%); color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.3s ease; margin: 5px; }
        .action-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-btn.sell-btn { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); }
        .action-btn.speed-btn { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); }
        .result-area { margin-top: 15px; padding: 15px; background: #1a1a2e; border-radius: 8px; min-height: 50px; text-align: center; }
        .result-area .result-icon { font-size: 40px; display: block; margin-bottom: 8px; }
        .result-area .result-text { font-size: 15px; color: #4ecdc4; }
        .inventory-preview { margin-top: 25px; background: #1a1a2e; border-radius: 10px; padding: 20px; }
        .inventory-preview h3 { color: #ff6b6b; margin-bottom: 12px; }
        .mats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; }
        .mat-item { background: #2a2a3e; border: 1px solid #4ecdc4; border-radius: 6px; padding: 6px; text-align: center; font-size: 11px; }
        .mat-item .mat-icon { font-size: 20px; display: block; }
        .streak-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        @media (max-width: 600px) { .top-bar { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Menu</button>
    <div class="header">
        <h1>🎮 Minigames</h1>
        <p>Fish and mine for loot! 50 actions each per hour. Sell your haul for gold.</p>
    </div>
    <div class="top-bar">
        <span>💰 Gold: <strong id="gold-display" style="color:#ffd93d;">0</strong></span>
        <span>📦 Loot: <strong id="loot-count" style="color:#4ecdc4;">0</strong></span>
        <span>🎣 Fish: <strong id="fish-remaining" style="color:#43e97b;">-</strong></span>
        <span>⛏️ Mine: <strong id="mine-remaining" style="color:#43e97b;">-</strong></span>
    </div>

    <div class="tab-bar">
        <button class="tab-btn tab-fish active" id="tab-fish" onclick="switchTab('fish')">🎣 Fishing</button>
        <button class="tab-btn tab-mine" id="tab-mine" onclick="switchTab('mine')">⛏️ Mining</button>
    </div>

    <div id="fish-panel" class="minigame-grid">
        <div class="minigame-card">
            <h2>🎣 Fishing</h2>
            <div class="icon">🐟</div>
            <div class="stats">Streak: <span id="fish-streak" class="streak-badge" style="background:#333;">0</span></div>
            <div>
                <button class="action-btn" id="fish-btn" onclick="doFishing()">🎣 Cast Line</button>
                <button class="action-btn speed-btn" id="fish-speed-btn" onclick="doFishingSpeed()">⚡ Cast 5x</button>
                <button class="action-btn sell-btn" id="fish-sell-btn" onclick="sellAllFish()">💰 Sell All Fish</button>
            </div>
            <div class="result-area" id="fish-result"><span style="color:#aaa;">Click to start fishing!</span></div>
        </div>
    </div>

    <div id="mine-panel" class="minigame-grid" style="display:none;">
        <div class="minigame-card mining-card">
            <h2>⛏️ Mining</h2>
            <div class="icon">💎</div>
            <div>
                <button class="action-btn" id="mine-btn" onclick="doMining()">⛏️ Mine</button>
                <button class="action-btn speed-btn" id="mine-speed-btn" onclick="doMiningSpeed()">⚡ Mine 5x</button>
                <button class="action-btn sell-btn" id="mine-sell-btn" onclick="sellAllOres()">💰 Sell All Ores</button>
            </div>
            <div class="result-area" id="mine-result"><span style="color:#aaa;">Click to start mining!</span></div>
        </div>
    </div>

    <div class="inventory-preview">
        <h3>📦 Your Loot</h3>
        <div class="mats-grid" id="loot-display"><span style="color:#aaa;">Loading...</span></div>
    </div>
</div>

<script src="gamestate.js"></script>
<script>
    var currentTab = 'fish';
    var fishStreak = 0;

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-fish').classList.toggle('active', tab === 'fish');
        document.getElementById('tab-mine').classList.toggle('active', tab === 'mine');
        document.getElementById('fish-panel').style.display = tab === 'fish' ? 'block' : 'none';
        document.getElementById('mine-panel').style.display = tab === 'mine' ? 'block' : 'none';
    }

    function minutesSince(timestamp) {
        if(!timestamp || timestamp <= 0) return 999;
        return (Date.now() - timestamp) / 60000;
    }

    function checkFishReset() {
        if (gameState.player.fishActions <= 0 && !gameState.player.fishResetTime) {
            gameState.player.fishResetTime = Date.now();
            gameState.saveToLocalStorage();
        }
        if (gameState.player.fishResetTime > 0 && minutesSince(gameState.player.fishResetTime) >= 60) {
            gameState.player.fishActions = 50;
            gameState.player.fishResetTime = 0;
            gameState.saveToLocalStorage();
        }
        var el = document.getElementById('fish-remaining');
        if(!el) return;
        if (gameState.player.fishActions <= 0 && gameState.player.fishResetTime > 0) {
            var minsLeft = 60 - Math.floor(minutesSince(gameState.player.fishResetTime));
            el.textContent = 'Resets in ' + minsLeft + 'm';
            el.style.color = '#e74c3c';
        } else {
            el.textContent = gameState.player.fishActions + ' left';
            el.style.color = gameState.player.fishActions <= 0 ? '#e74c3c' : gameState.player.fishActions <= 15 ? '#f39c12' : '#43e97b';
        }
        var fb = document.getElementById('fish-btn'); if(fb) fb.disabled = gameState.player.fishActions <= 0;
        var fsb = document.getElementById('fish-speed-btn'); if(fsb) fsb.disabled = gameState.player.fishActions < 5;
    }

    function checkMineReset() {
        if (gameState.player.mineActions <= 0 && !gameState.player.mineResetTime) {
            gameState.player.mineResetTime = Date.now();
            gameState.saveToLocalStorage();
        }
        if (gameState.player.mineResetTime > 0 && minutesSince(gameState.player.mineResetTime) >= 60) {
            gameState.player.mineActions = 50;
            gameState.player.mineResetTime = 0;
            gameState.saveToLocalStorage();
        }
        var el = document.getElementById('mine-remaining');
        if(!el) return;
        if (gameState.player.mineActions <= 0 && gameState.player.mineResetTime > 0) {
            var minsLeft = 60 - Math.floor(minutesSince(gameState.player.mineResetTime));
            el.textContent = 'Resets in ' + minsLeft + 'm';
            el.style.color = '#e74c3c';
        } else {
            el.textContent = gameState.player.mineActions + ' left';
            el.style.color = gameState.player.mineActions <= 0 ? '#e74c3c' : gameState.player.mineActions <= 15 ? '#f39c12' : '#43e97b';
        }
        var mb = document.getElementById('mine-btn'); if(mb) mb.disabled = gameState.player.mineActions <= 0;
        var msb = document.getElementById('mine-speed-btn'); if(msb) msb.disabled = gameState.player.mineActions < 5;
    }

    function doFishing() {
        checkFishReset();
        if (gameState.player.fishActions < 1) { alert('No fishing actions left!'); return; }
        gameState.player.fishActions--;
        gameState.saveToLocalStorage();
        checkFishReset();
        var btn = document.getElementById('fish-btn'); btn.disabled = true; btn.textContent = '🎣 Casting...';
        setTimeout(function() {
            var result = gameState.fish();
            if (result.reward.id === 'fish_old_boot') { fishStreak = 0; } else { fishStreak++; }
            if (fishStreak >= 5) { gameState.player.gold += fishStreak * 5; gameState.saveToLocalStorage(); }
            document.getElementById('fish-streak').textContent = fishStreak;
            document.getElementById('fish-streak').style.background = fishStreak >= 3 ? '#43e97b' : '#333';
            var msg = result.message;
            if (fishStreak >= 5) msg += ' +' + (fishStreak*5) + 'g streak!';
            document.getElementById('fish-result').innerHTML = '<span class="result-icon">' + result.reward.icon + '</span><span class="result-text">' + msg + '</span>';
            btn.disabled = false; btn.textContent = '🎣 Cast Again';
            updateDisplay();
        }, 500);
    }

    function doFishingSpeed() {
        checkFishReset();
        if (gameState.player.fishActions < 5) { alert('Need 5 actions!'); return; }
        gameState.player.fishActions -= 5;
        gameState.saveToLocalStorage();
        checkFishReset();
        var btn = document.getElementById('fish-speed-btn'); btn.disabled = true; btn.textContent = '⚡ Fishing...';
        var totalMsg = '';
        for (var i = 0; i < 5; i++) { totalMsg += gameState.fish().reward.icon + ' '; }
        document.getElementById('fish-result').innerHTML = '<span class="result-text">⚡ 5 casts: ' + totalMsg + '</span>';
        btn.disabled = false; btn.textContent = '⚡ Cast 5x';
        updateDisplay();
    }

    function sellAllFish() {
        var totalGold = 0;
        for (var i = gameState.player.inventory.length - 1; i >= 0; i--) {
            var item = gameState.player.inventory[i];
            if (item.type === 'loot' && item.id.indexOf('fish_') === 0) {
                totalGold += (item.price || 1) * item.quantity;
                gameState.player.inventory.splice(i, 1);
            }
        }
        gameState.player.gold += totalGold;
        gameState.saveToLocalStorage();
        alert(totalGold > 0 ? '💰 Sold all fish for ' + totalGold + ' gold!' : 'No fish to sell!');
        updateDisplay();
    }

    function doMining() {
        checkMineReset();
        if (gameState.player.mineActions < 1) { alert('No mining actions left!'); return; }
        gameState.player.mineActions--;
        gameState.saveToLocalStorage();
        checkMineReset();
        var btn = document.getElementById('mine-btn'); btn.disabled = true; btn.textContent = '⛏️ Mining...';
        setTimeout(function() {
            var result = gameState.mine();
            var veinMsg = '';
            if (Math.random() < 0.10) { gameState.mine(); gameState.mine(); veinMsg = ' ⛓️ Rich vein! +2 extra!'; }
            document.getElementById('mine-result').innerHTML = '<span class="result-icon">' + result.reward.icon + '</span><span class="result-text">' + result.message + veinMsg + '</span>';
            btn.disabled = false; btn.textContent = '⛏️ Mine Again';
            updateDisplay();
        }, 500);
    }

    function doMiningSpeed() {
        checkMineReset();
        if (gameState.player.mineActions < 5) { alert('Need 5 actions!'); return; }
        gameState.player.mineActions -= 5;
        gameState.saveToLocalStorage();
        checkMineReset();
        var btn = document.getElementById('mine-speed-btn'); btn.disabled = true; btn.textContent = '⚡ Mining...';
        var totalMsg = '';
        for (var i = 0; i < 5; i++) { totalMsg += gameState.mine().reward.icon + ' '; }
        document.getElementById('mine-result').innerHTML = '<span class="result-text">⚡ 5 mines: ' + totalMsg + '</span>';
        btn.disabled = false; btn.textContent = '⚡ Mine 5x';
        updateDisplay();
    }

    function sellAllOres() {
        var totalGold = 0;
        for (var i = gameState.player.inventory.length - 1; i >= 0; i--) {
            var item = gameState.player.inventory[i];
            if (item.type === 'loot' && item.id.indexOf('mine_') === 0) {
                totalGold += (item.price || 1) * item.quantity;
                gameState.player.inventory.splice(i, 1);
            }
        }
        gameState.player.gold += totalGold;
        gameState.saveToLocalStorage();
        alert(totalGold > 0 ? '💰 Sold all ores for ' + totalGold + ' gold!' : 'No ores to sell!');
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('gold-display').textContent = gameState.player.gold;
        var lootCount = 0;
        for (var i = 0; i < gameState.player.inventory.length; i++) {
            if (gameState.player.inventory[i].type === 'loot') lootCount += gameState.player.inventory[i].quantity;
        }
        document.getElementById('loot-count').textContent = lootCount;
        checkFishReset();
        checkMineReset();
        var container = document.getElementById('loot-display');
        var html = '';
        var lootItems = {};
        for (var i = 0; i < gameState.player.inventory.length; i++) {
            var item = gameState.player.inventory[i];
            if (item.type === 'loot') {
                if (!lootItems[item.id]) lootItems[item.id] = { icon: item.icon, name: item.name, qty: 0, price: item.price };
                lootItems[item.id].qty += item.quantity;
            }
        }
        var hasLoot = false;
        for (var key in lootItems) {
            hasLoot = true;
            var li = lootItems[key];
            html += '<div class="mat-item"><span class="mat-icon">' + li.icon + '</span>' + li.name + '<br><strong>x' + li.qty + '</strong><br><small style="color:#ffd93d;">💰' + (li.price||1) + 'g</small></div>';
        }
        if (!hasLoot) html = '<span style="color:#aaa;grid-column:1/-1;">No loot yet. Go fishing or mining!</span>';
        container.innerHTML = html;
    }

    if (!gameState.player.fishResetTime) gameState.player.fishResetTime = 0;
    if (!gameState.player.mineResetTime) gameState.player.mineResetTime = 0;

    setTimeout(function(){
        updateDisplay();
    }, 500);
</script>
</body>
</html>
