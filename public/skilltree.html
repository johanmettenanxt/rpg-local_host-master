<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Tree</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; font-family: 'Arial', sans-serif; min-height: 100vh; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 38px; color: #ff6b6b; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .header p { color: #aaa; margin-top: 8px; font-size: 14px; }
        .back-btn { padding: 10px 20px; background: #ff6b6b; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .back-btn:hover { transform: translateY(-2px); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #2a2a3e; border-radius: 10px; padding: 15px 25px; margin-bottom: 20px; border: 2px solid #ff6b6b; }
        .top-bar .points { font-size: 22px; font-weight: bold; color: #ffd93d; }
        .top-bar .respec-btn { padding: 10px 20px; background: #e74c3c; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .top-bar .respec-btn:hover { background: #c0392b; }
        .branches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .branch { background: #2a2a3e; border: 3px solid #4ecdc4; border-radius: 15px; padding: 20px; }
        .branch.warrior { border-color: #ff6b6b; }
        .branch.mage { border-color: #a366ff; }
        .branch.utility { border-color: #ffd93d; }
        .branch h2 { text-align: center; font-size: 24px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #444; }
        .branch.warrior h2 { color: #ff6b6b; }
        .branch.mage h2 { color: #a366ff; }
        .branch.utility h2 { color: #ffd93d; }
        .tier-label { font-size: 13px; color: #888; margin: 12px 0 6px 0; padding-left: 5px; border-left: 3px solid #555; }
        .skill-card { background: #1a1a2e; border: 2px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease; position: relative; }
        .skill-card:hover { border-color: #4ecdc4; transform: translateY(-2px); }
        .skill-card.maxed { opacity: 0.5; border-color: #555; }
        .skill-card.locked { opacity: 0.35; cursor: not-allowed; border-color: #444; }
        .skill-card .skill-name { font-weight: bold; font-size: 14px; margin-bottom: 3px; }
        .skill-card .skill-desc { font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .skill-card .skill-rank { font-size: 10px; color: #4ecdc4; }
        .skill-card .skill-cost { font-size: 10px; color: #ffd93d; position: absolute; top: 10px; right: 10px; }
        .skill-card.warrior-card { border-left: 3px solid #ff6b6b; }
        .skill-card.mage-card { border-left: 3px solid #a366ff; }
        .skill-card.utility-card { border-left: 3px solid #ffd93d; }
        .respec-info { text-align: center; margin-top: 20px; color: #aaa; font-size: 12px; }
        @media (max-width: 900px) { .branches { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Menu</button>
    <div class="header">
        <h1>🌟 Skill Tree</h1>
        <p>Spend skill points to unlock powerful abilities. Choose wisely!</p>
    </div>
    <div class="top-bar">
        <span class="points">⭐ Available Points: <span id="skill-points-display">0</span></span>
        <button class="respec-btn" id="respec-btn" onclick="respecSkills()">🔄 Respec All (<span id="respec-cost">0</span>g)</button>
    </div>
    <div class="branches">
        <!-- Warrior Branch -->
        <div class="branch warrior">
            <h2>⚔️ Warrior</h2>
            <div class="tier-label">Tier 1</div>
            <div id="skill-brute_force" class="skill-card warrior-card"></div>
            <div id="skill-toughness" class="skill-card warrior-card"></div>
            <div class="tier-label">Tier 2</div>
            <div id="skill-critical_strike" class="skill-card warrior-card"></div>
            <div id="skill-lifesteal" class="skill-card warrior-card"></div>
            <div class="tier-label">Tier 3</div>
            <div id="skill-thorns" class="skill-card warrior-card"></div>
            <div id="skill-execute" class="skill-card warrior-card"></div>
            <div class="tier-label">Tier 4</div>
            <div id="skill-berserker_rage" class="skill-card warrior-card"></div>
            <div id="skill-whirlwind" class="skill-card warrior-card"></div>
        </div>
        <!-- Mage Branch -->
        <div class="branch mage">
            <h2>🔮 Mage</h2>
            <div class="tier-label">Tier 1</div>
            <div id="skill-arcane_power" class="skill-card mage-card"></div>
            <div id="skill-mana_pool" class="skill-card mage-card"></div>
            <div class="tier-label">Tier 2</div>
            <div id="skill-mana_shield" class="skill-card mage-card"></div>
            <div id="skill-fire_mastery" class="skill-card mage-card"></div>
            <div class="tier-label">Tier 3</div>
            <div id="skill-poison_expert" class="skill-card mage-card"></div>
            <div id="skill-stun_duration" class="skill-card mage-card"></div>
            <div class="tier-label">Tier 4</div>
            <div id="skill-meteor" class="skill-card mage-card"></div>
            <div id="skill-mana_regeneration" class="skill-card mage-card"></div>
        </div>
        <!-- Utility Branch -->
        <div class="branch utility">
            <h2>💎 Utility</h2>
            <div class="tier-label">Tier 1</div>
            <div id="skill-gold_rush" class="skill-card utility-card"></div>
            <div id="skill-scavenger" class="skill-card utility-card"></div>
            <div class="tier-label">Tier 2</div>
            <div id="skill-haggler" class="skill-card utility-card"></div>
            <div id="skill-second_wind" class="skill-card utility-card"></div>
            <div class="tier-label">Tier 3</div>
            <div id="skill-lucky_gambler" class="skill-card utility-card"></div>
            <div id="skill-quick_learner" class="skill-card utility-card"></div>
            <div class="tier-label">Tier 4</div>
            <div id="skill-treasure_hunter" class="skill-card utility-card"></div>
            <div id="skill-resilience" class="skill-card utility-card"></div>
        </div>
    </div>
    <div class="respec-info">Respec cost = Level × 50 gold. All skill points are refunded.</div>
</div>

<script src="gamestate.js"></script>
<script>
    // Skill definitions
    var skillData = {
        brute_force:       { name: 'Brute Force', desc: '+2% damage per rank', ranks: 25, cost: 1, tier: 1, branch: 'warrior' },
        toughness:         { name: 'Toughness', desc: '+1% max HP per rank', ranks: 25, cost: 1, tier: 1, branch: 'warrior' },
        critical_strike:   { name: 'Critical Strike', desc: '+1% crit chance per rank', ranks: 20, cost: 1, tier: 2, branch: 'warrior' },
        lifesteal:         { name: 'Lifesteal', desc: 'Heal 3% of damage dealt per rank', ranks: 15, cost: 2, tier: 2, branch: 'warrior' },
        thorns:            { name: 'Thorns', desc: 'Reflect 5% damage back per rank', ranks: 15, cost: 2, tier: 3, branch: 'warrior' },
        execute:           { name: 'Execute', desc: 'Kill enemies below 2% HP per rank', ranks: 10, cost: 2, tier: 3, branch: 'warrior' },
        berserker_rage:    { name: 'Berserker Rage', desc: '+5% damage when below 50% HP per rank', ranks: 10, cost: 3, tier: 4, branch: 'warrior' },
        whirlwind:         { name: 'Whirlwind', desc: 'New AoE battle ability (30 mana)', ranks: 1, cost: 5, tier: 4, branch: 'warrior' },
        arcane_power:      { name: 'Arcane Power', desc: '+2% spell damage per rank', ranks: 25, cost: 1, tier: 1, branch: 'mage' },
        mana_pool:         { name: 'Mana Pool', desc: '+10 max mana per rank', ranks: 25, cost: 1, tier: 1, branch: 'mage' },
        mana_shield:       { name: 'Mana Shield', desc: 'Absorb 5% damage with mana per rank', ranks: 15, cost: 2, tier: 2, branch: 'mage' },
        fire_mastery:      { name: 'Fire Mastery', desc: 'Fireball costs 3 less mana per rank', ranks: 15, cost: 2, tier: 2, branch: 'mage' },
        poison_expert:     { name: 'Poison Expert', desc: 'Poison lasts +1 turn per rank', ranks: 10, cost: 2, tier: 3, branch: 'mage' },
        stun_duration:     { name: 'Stun Duration', desc: 'Stun lasts +1 turn per rank', ranks: 5, cost: 3, tier: 3, branch: 'mage' },
        meteor:            { name: 'Meteor', desc: 'New massive damage ability (50 mana)', ranks: 1, cost: 5, tier: 4, branch: 'mage' },
        mana_regeneration: { name: 'Mana Regeneration', desc: '+3 mana per turn per rank', ranks: 15, cost: 3, tier: 4, branch: 'mage' },
        gold_rush:         { name: 'Gold Rush', desc: '+4% gold from enemies per rank', ranks: 25, cost: 1, tier: 1, branch: 'utility' },
        scavenger:         { name: 'Scavenger', desc: '+2% better drop rates per rank', ranks: 25, cost: 1, tier: 1, branch: 'utility' },
        haggler:           { name: 'Haggler', desc: '3% shop discount per rank', ranks: 15, cost: 2, tier: 2, branch: 'utility' },
        second_wind:       { name: 'Second Wind', desc: 'Start battles with +5% HP per rank', ranks: 15, cost: 2, tier: 2, branch: 'utility' },
        lucky_gambler:     { name: 'Lucky Gambler', desc: '+2% better gamble odds per rank', ranks: 15, cost: 2, tier: 3, branch: 'utility' },
        quick_learner:     { name: 'Quick Learner', desc: '+4% EXP gain per rank', ranks: 15, cost: 2, tier: 3, branch: 'utility' },
        treasure_hunter:   { name: 'Treasure Hunter', desc: '+30% boss gold per rank', ranks: 10, cost: 3, tier: 4, branch: 'utility' },
        resilience:        { name: 'Resilience', desc: 'Auto-revive with 20% HP per rank', ranks: 5, cost: 5, tier: 4, branch: 'utility' }
    };

    function getSkillRank(skillId) {
        if (!gameState.player.skills) return 0;
        return gameState.player.skills[skillId] || 0;
    }

    function getSkillPoints() {
        return gameState.player.skillPoints || 0;
    }

    function isSkillUnlocked(skillId) {
        var data = skillData[skillId];
        if (!data) return false;
        if (data.tier === 1) return true;
        // Check if any skill in the previous tier of the same branch has at least 1 rank
        for (var id in skillData) {
            if (skillData[id].branch === data.branch && skillData[id].tier === data.tier - 1) {
                if (getSkillRank(id) > 0) return true;
            }
        }
        return false;
    }

    function canAffordSkill(skillId) {
        var data = skillData[skillId];
        if (!data) return false;
        return getSkillPoints() >= data.cost && getSkillRank(skillId) < data.ranks;
    }

    function buySkill(skillId) {
        var data = skillData[skillId];
        if (!data) return;
        if (!isSkillUnlocked(skillId)) { alert('Unlock a Tier ' + (data.tier - 1) + ' skill in this branch first!'); return; }
        if (getSkillRank(skillId) >= data.ranks) { alert('Already max rank!'); return; }
        if (getSkillPoints() < data.cost) { alert('Not enough skill points!'); return; }

        gameState.player.skillPoints -= data.cost;
        if (!gameState.player.skills) gameState.player.skills = {};
        if (!gameState.player.skills[skillId]) gameState.player.skills[skillId] = 0;
        gameState.player.skills[skillId]++;
        gameState.saveToLocalStorage();
        renderAllSkills();
        updateTopBar();
    }

    function respecSkills() {
        var cost = gameState.player.level * 50;
        if (gameState.player.gold < cost) { alert('Need ' + cost + ' gold to respec! You have ' + gameState.player.gold + 'g.'); return; }
        if (!confirm('Respec all skills for ' + cost + ' gold?\n\nAll skill points will be refunded. This cannot be undone.')) return;

        gameState.player.gold -= cost;
        var totalRefund = 0;
        if (gameState.player.skills) {
            for (var id in gameState.player.skills) {
                if (skillData[id]) {
                    totalRefund += gameState.player.skills[id] * skillData[id].cost;
                }
            }
        }
        gameState.player.skills = {};
        gameState.player.skillPoints = (gameState.player.skillPoints || 0) + totalRefund;
        gameState.saveToLocalStorage();
        renderAllSkills();
        updateTopBar();
        alert('✅ Skills reset! Refunded ' + totalRefund + ' skill points. Cost: ' + cost + 'g.');
    }

    function renderAllSkills() {
        for (var id in skillData) {
            renderSkillCard(id);
        }
    }

    function renderSkillCard(skillId) {
        var data = skillData[skillId];
        var card = document.getElementById('skill-' + skillId);
        if (!card) return;

        var rank = getSkillRank(skillId);
        var unlocked = isSkillUnlocked(skillId);
        var maxed = rank >= data.ranks;

        card.className = 'skill-card';
        if (data.branch === 'warrior') card.className += ' warrior-card';
        else if (data.branch === 'mage') card.className += ' mage-card';
        else card.className += ' utility-card';

        if (maxed) card.className += ' maxed';
        if (!unlocked) card.className += ' locked';

        card.innerHTML =
            '<div class="skill-name">' + data.name + '</div>' +
            '<div class="skill-desc">' + data.desc + '</div>' +
            '<div class="skill-rank">Rank: ' + rank + '/' + data.ranks + '</div>' +
            '<div class="skill-cost">' + data.cost + 'pt</div>';

        card.onclick = function() { buySkill(skillId); };
    }

    function updateTopBar() {
        document.getElementById('skill-points-display').textContent = getSkillPoints();
        document.getElementById('respec-cost').textContent = gameState.player.level * 50;
    }

    // Initialize
    if (!gameState.player.skills) gameState.player.skills = {};
    if (gameState.player.skillPoints === undefined) gameState.player.skillPoints = 0;

    renderAllSkills();
    updateTopBar();
</script>
</body>
</html>
